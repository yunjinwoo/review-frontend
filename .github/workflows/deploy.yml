name: Deploy Frontend to iwinv

on:
  push:
    branches: [ main ] # 메인 브랜치에 푸시될 때 실행됩니다.

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 1. 코드를 깃허브 공장으로 가져오기 (Checkout)
        uses: actions/checkout@v4

      - name: 2. 깃허브 공장에 Node.js 24버전 설치
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: 3. 깃허브 공장에서 의존성 설치 및 빌드
        run: |
          npm install
          npm run build
          # 참고: 깃허브의 CPU는 강력하므로 tsc 검사가 포함된 정환한 빌드를 수행해도 문제없습니다.

      - name: 4. 완성된 dist 폴더만 내 서버로 배달 (SCP 전송)
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          source: "dist"
          target: "~/reviewApp-frontend/review-frontend"

      - name: 5. 내 서버에 접속해서 PM2 켜기 (초경량 작업)
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          script: |
            cd ~/reviewApp-frontend/review-frontend
            
            # 1. 고스트 프로세스가 있다면 삭제
            pm2 delete frontend-app || true
            
            # 2. 방금 배달온 따끈따끈한 dist 폴더를 띄우기
            pm2 start npx --name "frontend-app" -- serve -s dist -l 3000
            
            # 3. 설정 저장 및 확인
            pm2 save
            pm2 list
